name: Web

on:
  push:
    paths:
      - 'web/**'
      - 'model/**'
      - 'examples/**'
      - 'scripts/**'
      - '.github/workflows/web.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'model/**'
      - 'examples/**'
      - 'scripts/**'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test web build
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ghcr.io/${{ github.repository }}/dev
          push: never
          runCmd: |
            bash scripts/generate-sail-doc.sh
            cd web/simulator && cargo test && wasm-pack build --target web && cd ../..
            cd web && npm ci && npx astro build

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build site
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ghcr.io/${{ github.repository }}/dev
          push: never
          runCmd: |
            bash scripts/generate-sail-doc.sh
            cd web/simulator && wasm-pack build --target web && cd ../..
            cd web && npm ci && npx astro build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
