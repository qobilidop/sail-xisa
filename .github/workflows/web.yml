name: Web

on:
  push:
    paths:
      - 'web/**'
      - 'model/**'
      - 'examples/**'
      - 'scripts/**'
      - '.github/workflows/web.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'model/**'
      - 'examples/**'
      - 'scripts/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OCaml and Sail
        run: |
          sudo apt-get update && sudo apt-get install -y opam libgmp-dev zlib1g-dev z3
          opam init --disable-sandboxing --yes --bare
          opam switch create 5.1.0 --yes
          eval $(opam env --switch=5.1.0)
          opam install sail --yes

      - name: Generate Sail docs
        run: |
          eval $(opam env --switch=5.1.0)
          bash scripts/generate-sail-doc.sh

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Rust tests
        working-directory: web/simulator
        run: cargo test

      - name: Build WASM
        working-directory: web/simulator
        run: wasm-pack build --target web

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build site
        working-directory: web
        run: npx astro build

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install OCaml and Sail
        run: |
          sudo apt-get update && sudo apt-get install -y opam libgmp-dev zlib1g-dev z3
          opam init --disable-sandboxing --yes --bare
          opam switch create 5.1.0 --yes
          eval $(opam env --switch=5.1.0)
          opam install sail --yes

      - name: Generate Sail docs
        run: |
          eval $(opam env --switch=5.1.0)
          bash scripts/generate-sail-doc.sh

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM
        working-directory: web/simulator
        run: wasm-pack build --target web

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build site
        working-directory: web
        run: npx astro build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
